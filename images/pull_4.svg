<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#0f1720}.m{fill:#333}.b{fill:#fff;stroke:#111;stroke-width:5}.thin{stroke:#111;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.soft{fill:#f6f7f8}.skin{fill:#f1b184;stroke:#111;stroke-width:4}.shirt{fill:#222;stroke:#111;stroke-width:4}.shorts{fill:#111;stroke:#111;stroke-width:4}.db{fill:#111;stroke:#111;stroke-width:3}.cue{font-size:38px;font-weight:800}.small{font-size:30px;font-weight:700}.title{font-size:66px;font-weight:900}.num{font-size:62px;font-weight:900;fill:#fff}
    </style>
  </defs>
  <rect x="18" y="18" width="1164" height="864" rx="28" class="b"/>
  <line x1="760" y1="72" x2="760" y2="720" stroke="#777" stroke-width="3" stroke-dasharray="8 13"/>
  <text x="520" y="300" class="title t" text-anchor="middle">俯身反向飞鸟</text>
  <line x1="420" y1="330" x2="620" y2="330" stroke="#111" stroke-width="4"/>
  <text x="520" y="390" class="small m" text-anchor="middle">默认：3组 × 12次</text>
  <rect x="398" y="214" width="72" height="72" rx="12" fill="#050505"/>
  <text x="434" y="268" class="num" text-anchor="middle">4</text>
  <text x="840" y="145" class="title t" font-size="54">动作要点</text>
  <text x="825" y="230" class="cue t">• 髋向后坐，背部中立</text>
  <text x="825" y="310" class="cue t">• 手臂微弯向两侧打开</text>
  <text x="825" y="390" class="cue t">• 肩胛稳定，不要耸肩</text>
  <text x="825" y="470" class="cue t">• 轻重量，找后束发力</text>
  <rect x="70" y="740" width="1060" height="92" rx="18" class="soft" stroke="#111" stroke-width="3"/>
  <circle cx="125" cy="786" r="32" fill="#111"/>
  <text x="125" y="798" font-size="34" fill="#fff" text-anchor="middle">灯</text>
  <text x="185" y="804" class="cue t">训练提示：俯身飞鸟先控制躯干稳定，再打开手臂找后束收缩。</text>

