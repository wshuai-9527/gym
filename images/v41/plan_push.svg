<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980"><rect width="900" height="980" rx="38" fill="#fff"/><text x="450" y="90" text-anchor="middle" font-size="62" font-family="Arial,'Microsoft YaHei'" font-weight="900">三分化训练计划</text><rect x="280" y="120" width="340" height="70" rx="18" fill="#111"/><text x="450" y="172" text-anchor="middle" font-size="46" fill="#fff" font-family="Arial" font-weight="900">Day 1 · Push</text><text x="450" y="240" text-anchor="middle" font-size="34" font-family="Arial,'Microsoft YaHei'" font-weight="800" fill="#444">胸 / 肩 / 三头</text><g font-family="Arial,'Microsoft YaHei'" font-size="34" font-weight="850"><rect x="55" y="285" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="350">1. 平板卧推</text><text x="650" y="350" text-anchor="middle">3 × 8–12</text><rect x="55" y="410" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="475">2. 坐姿推肩</text><text x="650" y="475" text-anchor="middle">3 × 8–12</text><rect x="55" y="535" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="600">3. 上斜卧推</text><text x="650" y="600" text-anchor="middle">3 × 8–12</text><rect x="55" y="660" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="725">4. 侧平举</text><text x="650" y="725" text-anchor="middle">3–4 × 12–15</text><rect x="55" y="785" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="850">5. 过顶臂屈伸</text><text x="650" y="850" text-anchor="middle">3 × 10–12</text></g></svg>