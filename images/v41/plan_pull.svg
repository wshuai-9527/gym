<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980"><rect width="900" height="980" rx="38" fill="#fff"/><text x="450" y="90" text-anchor="middle" font-size="62" font-family="Arial,'Microsoft YaHei'" font-weight="900">三分化训练计划</text><rect x="280" y="120" width="340" height="70" rx="18" fill="#111"/><text x="450" y="172" text-anchor="middle" font-size="46" fill="#fff" font-family="Arial" font-weight="900">Day 2 · Pull</text><text x="450" y="240" text-anchor="middle" font-size="34" font-family="Arial,'Microsoft YaHei'" font-weight="800" fill="#444">背 / 后束 / 二头</text><g font-family="Arial,'Microsoft YaHei'" font-size="32" font-weight="850"><rect x="55" y="285" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="350">1. 高位下拉</text><text x="650" y="350" text-anchor="middle">3 × 8–12</text><rect x="55" y="410" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="475">2. 上斜划船</text><text x="650" y="475" text-anchor="middle">3–4 × 8–12</text><rect x="55" y="535" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="600">3. 双臂哑铃俯身划船</text><text x="650" y="600" text-anchor="middle">3 × 8–12</text><rect x="55" y="660" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="725">4. 坐姿俯身反向飞鸟</text><text x="650" y="725" text-anchor="middle">2–3 × 12–15</text><rect x="55" y="785" width="790" height="105" rx="22" fill="#f7fbff" stroke="#111"/><text x="100" y="850">5. 靠腿二头弯举</text><text x="650" y="850" text-anchor="middle">3 × 10–12</text></g></svg>