function renderCheck(){let n=nextPlan(),p=PLAN[n.module],sig=n.date+'|'+n.module;if(draft.sig!==sig)draft={sig,rows:{}};$('#today-sub').textContent=p.sub+' · 固定计划日期';$('#date-chip').textContent=n.date;$('#focus-title').innerHTML=n.module+'<span style="margin-left:.14em">日</span>';$('#focus-desc').textContent=`计划日期 ${n.date} · 上次力量 ${n.last?.date||'—'}，篮球/休息不推进三分化。`;$('#focus-tags').innerHTML=`<span>V45</span><span>勾选不重置</span><span>${p.sub}</span>`;let html=`<img class="plan-img" src="${p.img}?v=45" alt="${p.title}">`;p.items.forEach((ex,i)=>{let setN=Number((ex[1].match(/^\d+/)||[3])[0]);if(ex[0]==='侧平举'||ex[0]==='上斜划船')setN=4;let isTime=ex[0]==='平板支撑',noKg=isTime||ex[0]==='平板支撑肩触碰',kg=noKg?'':lastKg(ex[0]);html+=`<article class="glass card"><div class="ex-top"><div><div class="ex-name">${ex[0]}</div><div class="ex-meta">${ex[3]} · ${ex[1]}</div></div><span class="pill">${ex[2]}</span></div><div class="cue">动作标准优先；稳定完成目标次数后，下一次再小幅加重。</div><div class="set-list">`;for(let j=0;j<setN;j++){let key=i+'-'+j,x=draft.rows[key]||{};html+=`<div class="set-row ${x.done?'checked':''}" data-ex="${i}" data-key="${key}"><button class="set-check" type="button">✓</button><b>第${j+1}组</b><div class="field"><input class="kg" ${noKg?'disabled':''} value="${x.kg??kg}" placeholder="${noKg?'—':'kg'}"><span class="unit">${noKg?'':'kg'}</span></div><div class="field"><input class="reps" value="${x.reps??(isTime?'80':'12')}" placeholder="${isTime?'秒':'次数'}"><span class="unit">${isTime?'s':''}</span></div></div>`}html+='</div></article>'});$('#check-list').innerHTML=html;count()}
function capture(){let n=nextPlan();draft.sig=n.date+'|'+n.module;draft.rows={};$$('.set-row').forEach(row=>draft.rows[row.dataset.key]={done:row.classList.contains('checked'),kg:row.querySelector('.kg')?.value||'',reps:row.querySelector('.reps')?.value||''})}function count(){let rows=$$('.set-row'),done=rows.filter(r=>r.classList.contains('checked')).length,p=rows.length?Math.round(done/rows.length*100):0;$('#set-count').textContent=`${done}/${rows.length} 组`;$('#ring').style.setProperty('--p',p);$('#progress-text').textContent=p+'%'}
function saveDay(){capture();let n=nextPlan(),p=PLAN[n.module],items=[];p.items.forEach((ex,i)=>{let sets=[];$$(`.set-row[data-ex="${i}"]`).forEach(row=>{if(!row.classList.contains('checked'))return;let kg=row.querySelector('.kg')?.value||0,reps=row.querySelector('.reps')?.value||'12';sets.push(ex[0]==='平板支撑'?`${reps}s`:ex[0]==='平板支撑肩触碰'?`${reps}`:`${kg}kg*${reps}`)});if(sets.length)items.push({name:ex[0],sets})});if(!items.length)return toast('至少勾选一组再保存。');let rs=records().filter(r=>r.date!==n.date);rs.push({date:n.date,items});setRecords(rs);draft={sig:'',rows:{}};toast(`已保存 ${n.date} ${n.module}`);renderAll()}function basketball(){let n=nextPlan(),rs=records().filter(r=>r.date!==n.date);rs.push({date:n.date,items:[{name:'篮球',sets:[]}]});setRecords(rs);draft={sig:'',rows:{}};toast(`已记录 ${n.date} 篮球/有氧`);renderAll()}
function rowsFrom(rs){let out=[];rs.forEach(r=>(r.items||[]).forEach(i=>{let e=EX[canon(i.name)];if(!e)return;(i.sets||[]).forEach(raw=>{let p=parseSet(raw);for(let k=0;k<Math.max(1,p.count||1);k++){let vol=(p.kg||0)*(p.reps||0)*(e.mul||1),stim=vol*(e.imp||1);out.push({date:r.date,name:canon(i.name),m:e.m,pat:e.pat,vol,stim,mus:e.mus})}})}));return out}function bar(obj,limit=20){let e=Object.entries(obj).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,limit),max=Math.max(1,...e.map(x=>x[1]));return e.map(([k,v])=>`<div class="rowbar"><b>${k}</b><div class="bar"><i style="width:${Math.max(5,Math.round(v/max*100))}%"></i></div><span>${fmt(v)}</span></div>`).join('')||'<p class="note">暂无有效数据。</p>'}
function renderAnalysis(){let rs=records(),rr=rowsFrom(rs),cnt={Push:0,Pull:0,Legs:0,Basketball:0,Rest:0},load={Push:0,Pull:0,Legs:0},mus={},pat={};rs.forEach(r=>cnt[moduleOf(r.items)]++);rr.forEach(x=>{load[x.m]=(load[x.m]||0)+x.stim;pat[x.pat]=(pat[x.pat]||0)+x.stim;Object.entries(x.mus||{}).forEach(([m,w])=>mus[m]=(mus[m]||0)+x.stim*w)});let total=rr.reduce((s,x)=>s+x.vol,0),strength=rs.filter(r=>!['Basketball','Rest'].includes(moduleOf(r.items))).length,last=[...rs].reverse().find(r=>!['Basketball','Rest'].includes(moduleOf(r.items))),seq=['Push','Pull','Legs'],lm=last?moduleOf(last.items):'Push',next=seq[(seq.indexOf(lm)+1)%3]||'Push';$('#ana-range').textContent=rs.length?`${rs[0].date}–${rs.at(-1).date}`:'暂无数据';$('#analysis-body').innerHTML=`<article class="glass card"><div class="kicker">PERFORMANCE MODEL</div><p class="note">当前 ${rs.length} 天记录，力量训练 ${strength} 次，有效力量组 ${rr.length} 组。按双哑铃系数、动作重要性、肌群贡献权重拆分。</p><span class="badge">总量 ${fmt(total)}</span><span class="badge">推${cnt.Push}</span><span class="badge">拉${cnt.Pull}</span><span class="badge">腿${cnt.Legs}</span><span class="badge">篮球${cnt.Basketball}</span></article><div class="metric-grid"><article class="glass card metric"><small>下一次力量</small><b>${next}</b><small>最后力量：${last?.date||'—'} ${lm}</small></article><article class="glass card metric"><small>主刺激肌群</small><b>${Object.entries(mus).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—'}</b><small>按累计刺激</small></article></div><article class="glass card"><div class="section-title"><h2>模块刺激量</h2><span>校正总量</span></div>${bar({推:load.Push,拉:load.Pull,腿:load.Legs},3)}</article><article class="glass card"><div class="section-title"><h2>肌群热区</h2><span>细分肌群</span></div>${bar(mus,20)}</article><article class="glass card"><div class="section-title"><h2>动作模式</h2><span>Movement pattern</span></div>${bar(pat,16)}</article><article class="glass card"><h2 style="margin:0 0 8px">科学解读</h2><p class="note">下一次建议 ${next}。如果上肢关节有酸胀，先减少侧平举、飞鸟、弯举等辅助量；主项保持动作标准，稳定完成目标次数后再小幅加重。</p></article>`}
function renderArchive(){let rs=records().slice().reverse();$('#archive-total').textContent=rs.length+' 天';$('#archive-list').innerHTML=rs.map(r=>`<div class="archive-day"><h3>${r.date}</h3>${(r.items||[]).map((it,idx)=>`<div class="archive-item"><button data-del="${r.date}|${idx}">删除</button><b>${canon(it.name)}</b><p>${(it.sets||[]).join(' / ')}</p></div>`).join('')}</div>`).join('')}function renderAll(){renderCheck();renderAnalysis();renderArchive()}
async function login(){if(!sb)return toast('Supabase SDK 未加载');let {error}=await sb.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#password').value});$('#cloud-status').innerHTML=error?`<span class="warn">登录失败：${error.message}</span>`:'<span class="ok">已登录。</span>';if(!error)toast('登录成功')}async function cloudRead(){if(!sb)return;let {data:{user}}=await sb.auth.getUser();if(!user)return toast('先密码登录');let days=await sb.from('training_days').select('*').order('training_date',{ascending:true});if(days.error)return $('#cloud-status').innerHTML=`<span class="warn">读取失败：${days.error.message}</span>`;let ids=(days.data||[]).map(d=>d.id),sets=[];if(ids.length){let res=await sb.from('training_sets').select('*').in('day_id',ids).order('set_index',{ascending:true});if(res.error)return $('#cloud-status').innerHTML=`<span class="warn">读取组失败：${res.error.message}</span>`;sets=res.data||[]}let rs=(days.data||[]).map(d=>{let by={};sets.filter(s=>s.day_id===d.id).forEach(s=>{let name=canon(s.exercise_name||s.exercise_key||'未命名'),raw=s.seconds?`${s.seconds}s`:`${Number(s.weight_kg||0)}kg*${Number(s.reps||0)}`;(by[name]||(by[name]=[])).push(raw)});let items=Object.entries(by).map(([name,sets])=>({name,sets}));if(!items.length&&(d.module==='Basketball'||d.module==='Rest'))items.push({name:d.module==='Basketball'?'篮球':'休息',sets:[]});return{date:d.date_label||fromIso(d.training_date),items}});setRecords(rs);$('#cloud-status').innerHTML=`<span class="ok">云端已读取：${rs.length} 天。</span>`;renderAll()}async function cloudUpload(){if(!sb)return;let {data:{user}}=await sb.auth.getUser();if(!user)return toast('先密码登录');for(let r of records()){let old=await sb.from('training_days').select('id').eq('training_date',iso(r.date)).maybeSingle();if(old.data?.id){await sb.from('training_sets').delete().eq('day_id',old.data.id);await sb.from('training_days').delete().eq('id',old.data.id)}let day=await sb.from('training_days').insert({user_id:user.id,training_date:iso(r.date),date_label:r.date,module:moduleOf(r.items)}).select('id').single();if(day.error)return $('#cloud-status').innerHTML=`<span class="warn">上传失败：${day.error.message}</span>`;let rows=[];(r.items||[]).forEach(it=>(it.sets||[]).forEach((raw,i)=>{let p=parseSet(raw);rows.push({day_id:day.data.id,user_id:user.id,exercise_name:canon(it.name),exercise_key:canon(it.name),set_index:i+1,weight_kg:p.kg||null,reps:p.reps||null,seconds:p.sec||null})}));if(rows.length){let ins=await sb.from('training_sets').insert(rows);if(ins.error)return $('#cloud-status').innerHTML=`<span class="warn">上传组失败：${ins.error.message}</span>`}}$('#cloud-status').innerHTML=`<span class="ok">已上传本机档案：${records().length} 天。</span>`}
function manualAdd(){let lines=$('#manual-input').value.split('\n').map(x=>x.trim()).filter(Boolean),date='',items=[],cur=null;lines.forEach(l=>{if(/^\d{1,2}\.\d{1,2}$/.test(l)){date=l;return}if(/kg|\d+s|^\d+/.test(l)&&cur){let p=parseSet(l);for(let i=0;i<Math.max(1,p.count||1);i++)cur.sets.push(p.sec?`${p.sec}s`:p.kg?`${p.kg}kg*${p.reps}`:`${p.reps}`)}else{cur={name:canon(l),sets:[]};items.push(cur)}});if(!date||!items.length)return toast('格式不完整');let rs=records().filter(r=>r.date!==date);rs.push({date,items});setRecords(rs);$('#manual-input').value='';toast('已添加 '+date);renderAll()}function exportJson(){let b=new Blob([JSON.stringify({records:records()},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='gym-records.json';a.click();URL.revokeObjectURL(a.href)}
$$('.nav button').forEach(b=>b.onclick=()=>{$$('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');$$('.screen').forEach(s=>s.classList.remove('active'));$('#'+b.dataset.go).classList.add('active');renderAll()});document.addEventListener('click',e=>{let btn=e.target.closest('.set-check');if(btn){let row=btn.closest('.set-row');row.classList.toggle('checked');capture();count()}let del=e.target.dataset.del;if(del){let [date,idx]=del.split('|'),rs=records(),r=rs.find(x=>x.date===date);if(r){r.items.splice(Number(idx),1);if(!r.items.length)rs.splice(rs.indexOf(r),1);setRecords(rs);renderAll()}}});document.addEventListener('input',e=>{if(e.target.closest('.set-row'))capture()});
$('#save-day').onclick=saveDay;$('#clear-day').onclick=()=>{draft={sig:'',rows:{}};renderCheck();toast('已清空本次勾选')};$('#basketball-day').onclick=basketball;$('#login-pass').onclick=login;$('#logout').onclick=async()=>{if(sb)await sb.auth.signOut();$('#cloud-status').textContent='已退出。'};$('#cloud-read').onclick=cloudRead;$('#cloud-upload').onclick=cloudUpload;$('#manual-add').onclick=manualAdd;$('#export-json').onclick=exportJson;$('#archive-refresh').onclick=renderArchive;
let timer=90,left=90,tick=null;function showT(){$('#timer-display').textContent=String(Math.floor(left/60)).padStart(2,'0')+':'+String(left%60).padStart(2,'0')}$$('[data-timer]').forEach(b=>b.onclick=()=>{timer=left=Number(b.dataset.timer);showT()});$('#timer-toggle').onclick=()=>{if(tick){clearInterval(tick);tick=null;$('#timer-toggle').textContent='开始';return}tick=setInterval(()=>{left--;showT();if(left<=0){clearInterval(tick);tick=null;$('#timer-toggle').textContent='开始';toast('休息结束')}},1000);$('#timer-toggle').textContent='暂停'};$('#timer-reset').onclick=()=>{left=timer;showT()};showT();renderAll();
})();
