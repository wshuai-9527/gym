function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}function canon(n){return ALIAS[(n||'').trim()]||(n||'').trim()}function state(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return{}}}function saveState(s){localStorage.setItem(KEY,JSON.stringify(s))}function getRecords(){return (state().records||[]).map(r=>({date:r.date,items:(r.items||[]).map(i=>({name:canon(i.name),sets:i.sets||[]}))})).sort((a,b)=>md(a.date)-md(b.date))}function setRecords(records){saveState({records:records.sort((a,b)=>md(a.date)-md(b.date))})}function md(x){const [m,d]=String(x).split('.').map(Number);return new Date(YEAR,m-1,d)}function lab(d){return `${d.getMonth()+1}.${d.getDate()}`}function isoFromLabel(x){const d=md(x);return d.toISOString().slice(0,10)}function labelFromISO(x){const d=new Date(x+'T00:00:00');return `${d.getMonth()+1}.${d.getDate()}`}function moduleOf(items){const txt=(items||[]).map(i=>canon(i.name)).join(' ');if(txt.includes('篮球'))return'Basketball';if(/休息/.test(txt))return'Rest';const s={Push:0,Pull:0,Legs:0};(items||[]).forEach(i=>{const e=EX[canon(i.name)];if(e)s[e.m]++});return Object.entries(s).sort((a,b)=>b[1]-a[1])[0]?.[1]?Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0]:'Other'}function parseSet(s){s=String(s||'').replace(/×/g,'*').replace(/\s/g,'');const a=(s.match(/[\d.]+/g)||[]).map(Number);if(/kg/i.test(s))return{kg:a[0]||0,reps:a[1]||0,count:a[2]||1,sec:0};if(/s/i.test(s))return{kg:0,reps:0,count:a[1]||1,sec:a[0]||0};return{kg:0,reps:a[0]||0,count:a[1]||1,sec:0}}function compactSets(sets){return (sets||[]).join(' / ')}

function bar(obj,limit=18){let e=Object.entries(obj).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,limit),max=Math.max(1,...e.map(x=>x[1]));return e.map(([k,v])=>`<div class="rowbar"><b>${k}</b><div class="bar"><i style="width:${Math.max(5,Math.round(v/max*100))}%"></i></div><span>${fmt(v)}</span></div>`).join('')||'<p class="note">暂无有效数据。</p>'}function trendSvg(rs,rr){const cal=rs.map(r=>({date:r.date,m:moduleOf(r.items),vol:0}));rr.forEach(x=>{const c=cal.find(c=>c.date===x.date);if(c)c.vol+=x.vol});const w=360,h=210,p=28,max=Math.max(1,...cal.map(x=>x.vol))*1.08,slot=(w-2*p)/Math.max(1,cal.length),pts=[];const bars=cal.map((x,i)=>{const bh=x.vol/max*(h-2*p),xx=p+i*slot+slot*.18;pts.push([p+i*slot+slot*.5,h-p-bh]);const fill=x.m==='Basketball'?'#bcaeff':x.m==='Rest'?'#cbd8e4':x.m==='Legs'?'#78efd0':x.m==='Pull'?'#40cffd':'#65d6f0';return`<rect x="${xx}" y="${h-p-bh}" width="${Math.max(2,slot*.64)}" height="${bh}" rx="4" fill="${fill}" opacity="${x.vol?.48:.12}"/>`}).join('');return`<svg class="svg" viewBox="0 0 ${w} ${h}">${bars}<path d="${pts.map((q,i)=>(i?'L':'M')+q[0]+','+q[1]).join(' ')}" fill="none" stroke="#40cffd" stroke-width="4" stroke-linecap="round"/><text x="${p}" y="18" font-size="11" fill="#708096">Daily load</text><text x="${p}" y="${h-4}" font-size="11" fill="#708096">${cal[0]?.date||''}</text><text x="${w-p}" y="${h-4}" text-anchor="end" font-size="11" fill="#708096">${cal.at(-1)?.date||''}</text></svg>`}

function renderArchive(){const rs=getRecords().slice().reverse();$('#archive-total').textContent=rs.length+' 天';$('#archive-list').innerHTML=rs.map(r=>`<div class="archive-day"><h3>${r.date}</h3>${(r.items||[]).map((it,idx)=>`<div class="archive-item"><button data-del="${r.date}|${idx}">删除</button><b>${canon(it.name)}</b><p>${compactSets(it.sets)}</p></div>`).join('')}</div>`).join('')}function renderAll(){renderCheck();renderAnalysis();renderArchive()}
async function login(){if(!sb){toast('Supabase SDK 未加载');return}const email=$('#email').value.trim(),password=$('#password').value;const {error}=await sb.auth.signInWithPassword({email,password});if(error){$('#cloud-status').innerHTML='<span class="warn">登录失败：'+error.message+'</span>';return}$('#cloud-status').innerHTML='<span class="ok">已登录。</span>';toast('登录成功')}async function logout(){if(sb)await sb.auth.signOut();$('#cloud-status').textContent='已退出。'}async function cloudRead(){if(!sb)return;const {data:{user}}=await sb.auth.getUser();if(!user){toast('先密码登录');return}const days=await sb.from('training_days').select('*').order('training_date',{ascending:true});if(days.error){$('#cloud-status').innerHTML='<span class="warn">读取失败：'+days.error.message+'</span>';return}const ids=(days.data||[]).map(d=>d.id);let sets=[];if(ids.length){const res=await sb.from('training_sets').select('*').in('day_id',ids).order('set_index',{ascending:true});if(res.error){$('#cloud-status').innerHTML='<span class="warn">读取组失败：'+res.error.message+'</span>';return}sets=res.data||[]}const records=(days.data||[]).map(d=>{const ss=sets.filter(s=>s.day_id===d.id),by={};ss.forEach(s=>{const name=canon(s.exercise_name||s.exercise_key||'未命名'),raw=s.seconds?`${s.seconds}s`:`${Number(s.weight_kg||0)}kg*${Number(s.reps||0)}`;(by[name]||(by[name]=[])).push(raw)});const items=Object.entries(by).map(([name,sets])=>({name,sets}));if(!items.length&&(d.module==='Basketball'||d.module==='Rest'))items.push({name:d.module==='Basketball'?'篮球':'休息',sets:[]});return{date:d.date_label||labelFromISO(d.training_date),items}});setRecords(records);$('#cloud-status').innerHTML='<span class="ok">云端已读取：'+records.length+' 天。</span>';renderAll()}async function cloudUpload(){if(!sb)return;const {data:{user}}=await sb.auth.getUser();if(!user){toast('先密码登录');return}for(const r of getRecords()){const old=await sb.from('training_days').select('id').eq('training_date',isoFromLabel(r.date)).maybeSingle();if(old.data?.id){await sb.from('training_sets').delete().eq('day_id',old.data.id);await sb.from('training_days').delete().eq('id',old.data.id)}const day=await sb.from('training_days').insert({user_id:user.id,training_date:isoFromLabel(r.date),date_label:r.date,module:moduleOf(r.items)}).select('id').single();if(day.error){$('#cloud-status').innerHTML='<span class="warn">上传失败：'+day.error.message+'</span>';return}const rows=[];(r.items||[]).forEach(it=>(it.sets||[]).forEach((raw,i)=>{const p=parseSet(raw);rows.push({day_id:day.data.id,user_id:user.id,exercise_name:canon(it.name),exercise_key:canon(it.name),set_index:i+1,weight_kg:p.kg||null,reps:p.reps||null,seconds:p.sec||null})}));if(rows.length){const ins=await sb.from('training_sets').insert(rows);if(ins.error){$('#cloud-status').innerHTML='<span class="warn">上传组失败：'+ins.error.message+'</span>';return}}}$('#cloud-status').innerHTML='<span class="ok">已上传本机档案：'+getRecords().length+' 天。</span>'}
function manualAdd(){const lines=$('#manual-input').value.split('\n').map(x=>x.trim()).filter(Boolean);if(!lines.length)return;let date='',items=[],cur=null;lines.forEach(l=>{if(/^\d{1,2}\.\d{1,2}$/.test(l)){date=l;return}if(/kg|\d+s|^\d+/.test(l)&&cur){const p=parseSet(l);for(let i=0;i<Math.max(1,p.count||1);i++)cur.sets.push(p.sec?`${p.sec}s`:p.kg?`${p.kg}kg*${p.reps}`:`${p.reps}`)}else{cur={name:canon(l),sets:[]};items.push(cur)}});if(!date||!items.length){toast('格式不完整');return}const rs=getRecords().filter(r=>r.date!==date);rs.push({date,items});setRecords(rs);$('#manual-input').value='';toast('已添加 '+date);renderAll()}function exportJson(){const blob=new Blob([JSON.stringify({records:getRecords()},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gym-records.json';a.click();URL.revokeObjectURL(a.href)}
$$('.nav button').forEach(b=>b.onclick=()=>{$$('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');$$('.screen').forEach(s=>s.classList.remove('active'));$('#screen-'+b.dataset.go).classList.add('active');renderAll()});document.addEventListener('click',e=>{const row=e.target.closest('.set-row');if(e.target.closest('.set-check')){e.preventDefault();row.classList.toggle('checked');capture();count()}const del=e.target.dataset.del;if(del){const [date,idx]=del.split('|');const rs=getRecords();const r=rs.find(x=>x.date===date);if(r){r.items.splice(Number(idx),1);if(!r.items.length)rs.splice(rs.indexOf(r),1);setRecords(rs);renderAll()}}});document.addEventListener('input',e=>{if(e.target.closest('.set-row'))capture()});$('#save-day').onclick=saveDay;$('#clear-day').onclick=clearDay;$('#basketball-day').onclick=basketball;$('#login-pass').onclick=login;$('#logout').onclick=logout;$('#cloud-read').onclick=cloudRead;$('#cloud-upload').onclick=cloudUpload;$('#manual-add').onclick=manualAdd;$('#export-json').onclick=exportJson;$('#restore-default').onclick=()=>{setRecords(DEFAULT.map(([date,items])=>({date,items:items.map(([name,sets])=>({name,sets}))})));toast('已恢复内置档案');renderAll()};$('#archive-refresh').onclick=renderArchive;
let timer=90,left=90,tick=null;function showT(){const m=String(Math.floor(left/60)).padStart(2,'0'),s=String(left%60).padStart(2,'0');$('#timer-display').textContent=m+':'+s}$$('[data-timer]').forEach(b=>b.onclick=()=>{timer=left=Number(b.dataset.timer);showT()});$('#timer-toggle').onclick=()=>{if(tick){clearInterval(tick);tick=null;$('#timer-toggle').textContent='开始';return}tick=setInterval(()=>{left--;showT();if(left<=0){clearInterval(tick);tick=null;$('#timer-toggle').textContent='开始';toast('休息结束')}},1000);$('#timer-toggle').textContent='暂停'};$('#timer-reset').onclick=()=>{left=timer;showT()};showT();renderAll();
})();
